<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded-square accent background — mirrors the landing page logo
       widget (warm theme accent on accentSoft background tile). -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#A85E14"/>
  <!-- Lucide `book-open` icon (24×24 viewBox), centered + scaled to 36px,
