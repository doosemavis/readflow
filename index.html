<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#A85E14" />

    <title>ReadFlow — Adaptive Reading Enhancement</title>
    <meta name="description" content="A reader for documents that adapts to the way you read — typography, themes, and visual aids that make long-form text easier on every kind of brain." />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ReadFlow" />
    <meta property="og:title" content="ReadFlow — Adaptive Reading Enhancement" />
    <meta property="og:description" content="Adaptive typography, accessible themes, and reading aids that make long-form text easier on every kind of brain." />
    <meta property="og:url" content="https://myreadflow.com/" />
    <meta property="og:image" content="https://myreadflow.com/favicon.svg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ReadFlow — Adaptive Reading Enhancement" />
    <meta name="twitter:description" content="Adaptive typography, accessible themes, and reading aids that make long-form text easier on every kind of brain." />
    <meta name="twitter:image" content="https://myreadflow.com/favicon.svg" />

    <!-- Favicon (SVG works in all modern browsers; .ico fallback can be added later if IE/old browsers matter) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA install -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
